<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>tfmxplay XM — Audio Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: #0d1117; color: #e6edf3;
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; padding: 2rem;
  }
  .card {
    background: #161b22; border: 1px solid #30363d; border-radius: 12px;
    padding: 2.5rem; max-width: 480px; width: 100%; text-align: center;
  }
  h1 { font-size: 1.4rem; margin-bottom: 0.3rem; }
  .subtitle { color: #8b949e; font-size: 0.9rem; margin-bottom: 1.5rem; }
  .track { color: #58a6ff; font-size: 1.1rem; margin-bottom: 1.5rem; }
  audio { width: 100%; margin-bottom: 1.5rem; }
  a { color: #58a6ff; text-decoration: none; }
  a:hover { text-decoration: underline; }
  .footer { color: #8b949e; font-size: 0.8rem; margin-top: 1rem; }
</style>
</head>
<body>
<div class="card">
  <h1>tfmxplay XM</h1>
  <p class="subtitle">TFMX to XM Converter — Audio Demo</p>
  <p class="track">Turrican 2 — World 1</p>
  <audio controls preload="metadata">
    <source src="demo_t2world1.mp3" type="audio/mpeg">
    Your browser does not support the audio element.
  </audio>
  <p><a href="https://github.com/ray77/tfmxplayxm">GitHub Repository</a></p>
  <p class="footer">Music by Chris Huelsbeck — Converted with tfmxplay XM</p>
</div>
</body>
</html>
